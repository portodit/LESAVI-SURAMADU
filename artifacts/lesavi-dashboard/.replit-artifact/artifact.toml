kind = "web"
previewPath = "/"
title = "LESAVI VI · Witel Suramadu"
version = "1.0.0"
id = "artifacts/lesavi-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21475

[services.development]
run = "pnpm --filter @workspace/lesavi-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lesavi-dashboard", "run", "build" ]
publicDir = "artifacts/lesavi-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21475"
BASE_PATH = "/"
