kind = "web"
previewPath = "/"
title = "Telkom AM Reminder Dashboard"
version = "1.0.0"
id = "artifacts/telkom-am-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24930

[services.development]
run = "pnpm --filter @workspace/telkom-am-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telkom-am-dashboard", "run", "build" ]
publicDir = "artifacts/telkom-am-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24930"
BASE_PATH = "/"
